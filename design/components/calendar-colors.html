<!-- @dsCard group="Foundations" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>行事曆六類色</title>
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../style.css">
<style>
  body{margin:0;padding:28px;background:var(--bg);font-family:'Noto Sans TC',sans-serif}
  .cc-pal{display:flex;flex-wrap:wrap;gap:16px}
  .cc-sw{display:flex;flex-direction:column;gap:8px;width:120px}
  .cc-chip{height:72px;border-radius:14px;border:1px solid rgba(0,0,0,.06)}
  .cc-lbl{font-size:13px;font-weight:600;color:var(--tx)}
  .cc-hex{font-size:11px;color:var(--tx3);font-family:'DM Mono',monospace}
  h2{font-size:15px;color:var(--tx);margin:0 0 4px}
  p{font-size:12px;color:var(--tx2);margin:0 0 20px}
</style>
</head>
<body>

<h2>行事曆六類色</h2>
<p>圖例、課程卡、教室時間軸、進行中 hero、週檢視共用。改這六色＝全站課程顏色一起變。</p>

<!-- 重新配色時就改這六個色塊；色值取自 tokens.css 的 --cal-* token -->
<div class="cc-pal">
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-general)"></div><span class="cc-lbl">一般課程</span><span class="cc-hex">--cal-general</span></div>
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-resched)"></div><span class="cc-lbl">調課</span><span class="cc-hex">--cal-resched</span></div>
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-makeup)"></div><span class="cc-lbl">補課</span><span class="cc-hex">--cal-makeup</span></div>
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-extra)"></div><span class="cc-lbl">加課</span><span class="cc-hex">--cal-extra</span></div>
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-trial)"></div><span class="cc-lbl">試聽</span><span class="cc-hex">--cal-trial</span></div>
  <div class="cc-sw"><div class="cc-chip" style="background:var(--cal-practice)"></div><span class="cc-lbl">練習課</span><span class="cc-hex">--cal-practice</span></div>
</div>

</body>
</html>
