<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · 登入頁</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../tokens.css">
<link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="login-split">
    <div class="login-brand">
      <div class="login-brand-head">
        <div class="login-mark"></div>
        <div class="login-brand-name">HOBE<span>排程系統</span></div>
      </div>
      <div class="login-brand-body">
        <h1 class="login-headline">把請假、補課、調課<br>一次排好</h1>
        <p class="login-lead">串接 Google 行事曆的補習班排程系統，今日與本週每一堂課、每一筆請假補課，一眼掌握。</p>
      </div>
      <div class="login-stats">
        <div class="login-stat"><span class="login-stat-n">100+</span><span class="login-stat-l">在學學生</span></div>
        <div class="login-stat"><span class="login-stat-n">5</span><span class="login-stat-l">教室</span></div>
        <div class="login-stat"><span class="login-stat-n">2</span><span class="login-stat-l">分校</span></div>
      </div>
    </div>
    <div class="login-side">
      <div class="login-box">
        <h2>歡迎回來</h2>
        <p class="login-box-sub">請使用有行事曆存取權限的 Google 帳號登入</p>
        <button class="gbtn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          使用 Google 帳號登入
        </button>
        <div class="login-perm">
          <svg class="login-perm-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>僅需<b>讀取</b>你的 Google 行事曆來顯示課程，不會更動你的行程。</span>
        </div>
        <div class="login-state"><span class="login-state-dot"></span>系統就緒・等待登入</div>
      </div>
    </div>
  </div>
</body>
</html>
