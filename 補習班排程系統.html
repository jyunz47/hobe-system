<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補習班排程系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="logo"><h1>📚 補習班排程系統</h1><p>Scheduling System</p></div>
  <nav class="nav">
    <div class="nav-sec">課程管理</div>
    <button class="ni active" id="nav-courses" onclick="switchPanel('courses')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
      課程
    </button>
    <button class="ni" id="nav-makeup" onclick="switchPanel('makeup')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 12h6M9 16h4"/></svg>
      待補課/調課清單
      <span class="nbadge" id="badge-makeup" style="display:none">0</span>
    </button>
    <button class="ni" id="nav-students" onclick="switchPanel('students')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      學生管理
    </button>
  </nav>
  <div class="sf">
    <div class="ubox">
      <div class="udot" id="udot"></div>
      <div class="uinfo"><strong id="uname">未登入</strong><span id="usub">請登入 Google 帳號</span></div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div><div class="tbt" id="tbt">課程</div><div class="tbs" id="tbs">今日與本週課程</div></div>
    <div class="tba">
      <button class="btn btns" id="btn-refresh" style="display:none" onclick="refreshCurrent()">↻ 更新</button>
      <button class="btn btns" id="btn-signout" style="display:none" onclick="signOut()">登出</button>
    </div>
  </div>
  <div class="content">

    <!-- Login -->
    <div id="panel-login" class="panel active">
      <div class="login-wrap">
        <div class="login-card">
          <h2>補習班排程系統</h2>
          <p>請使用有行事曆存取權限的 Google 帳號登入</p>
          <button class="gbtn" onclick="signIn()">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            使用 Google 帳號登入
          </button>
        </div>
      </div>
    </div>

    <!-- Courses -->
    <div id="panel-courses" class="panel" style="display:none">
      <div id="err-courses" class="err" style="display:none"></div>

      <!-- Today -->
      <div class="sec-hd"><span id="today-sec-title">今日課程</span><div class="sec-hd-line"></div></div>
      <div class="date-nav">
        <div class="date-title" id="date-title">—</div>
        <button class="dbtn" onclick="changeDay(-1)">‹ 前一天</button>
        <button class="dbtn" onclick="goToday()">今天</button>
        <button class="dbtn" onclick="changeDay(1)">後一天 ›</button>
        <input type="date" id="date-picker" onchange="pickDate(this.value)">

      </div>
      <div class="legend">
        <div class="lgi"><div class="lgd" style="background:#3B82F6"></div>一般課程</div>
        <div class="lgi"><div class="lgd" style="background:#EF4444"></div>調課</div>
        <div class="lgi"><div class="lgd" style="background:#F97316"></div>補課</div>
        <div class="lgi"><div class="lgd" style="background:#EAB308"></div>加課</div>
        <div class="lgi"><div class="lgd" style="background:#22C55E"></div>試聽</div>
        <div class="lgi"><div class="lgd" style="background:#A855F7"></div>練習課</div>
      </div>
      <div id="today-hero"></div>
      <div class="tsum" id="today-summary"></div>
      <div class="tgrid mb20" id="clist-today"><div class="empty" style="grid-column:1/-1">載入中...</div></div>

      <!-- This week -->
      <div class="sec-hd">
        <span id="week-sec-title">本週課程</span>
        <div class="sec-hd-line"></div>
        <button class="dbtn" onclick="changeWeek(-1)" style="font-size:12px;padding:4px 9px;flex-shrink:0">‹ 上一週</button>
        <button class="dbtn" onclick="changeWeek(0)" style="font-size:12px;padding:4px 9px;flex-shrink:0">本週</button>
        <button class="dbtn" onclick="changeWeek(1)" style="font-size:12px;padding:4px 9px;flex-shrink:0">下一週 ›</button>
      </div>
      <div class="wsum-grid" id="wsum-grid"></div>
      <div class="wfocus" id="wfocus"><div class="empty">載入中...</div></div>
    </div>

    <!-- Students -->
    <div id="panel-students" class="panel" style="display:none">
      <div class="stu-panel-hd">
        <h2>學生管理</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btns" onclick="scanStudentsFromCalendar()">🔍 掃描課表</button>
          <button class="btn btns btnp" onclick="toggleAddStudentForm()">＋ 新增學生</button>
        </div>
      </div>
      <div id="stu-scan-sec" style="display:none"></div>
      <div class="stu-add-form" id="stu-add-form" style="display:none">
        <input id="stu-name-input" placeholder="學生姓名" maxlength="20">
        <select id="stu-grade-input">
          <option value="國小">國小</option>
          <option value="國一">國一</option>
          <option value="國二" selected>國二</option>
          <option value="國三">國三</option>
          <option value="高一">高一</option>
          <option value="高二">高二</option>
          <option value="高三">高三</option>
        </select>
        <button class="btn btns btnp" onclick="addStudent()">新增</button>
        <button class="btn btns" onclick="toggleAddStudentForm()">取消</button>
      </div>
      <div id="stu-list"></div>
    </div>

    <!-- Makeup -->
    <div id="panel-makeup" class="panel" style="display:none">
      <div id="err-makeup" class="err" style="display:none"></div>
      <div class="filter-bar">
        <select id="f-subject" onchange="renderMakeup()"><option value="">全部科目</option></select>
        <select id="f-type" onchange="renderMakeup()">
          <option value="">全部類型</option>
          <option value="學生請假">學生請假</option>
          <option value="老師請假">老師請假</option>
          <option value="調課">調課</option>
        </select>
        <select id="f-sort" onchange="renderMakeup()">
          <option value="asc">缺課日期（由近到遠）</option>
          <option value="desc">缺課日期（由遠到近）</option>
        </select>
        <div class="rc" id="rc"></div>
      </div>
      <div class="clist" id="clist-makeup"><div class="empty">按「更新」載入資料</div></div>
    </div>

  </div>
</div>
</div>

<div class="sp-modal" id="sp-modal">
  <div class="sp-overlay" onclick="closeSlotPicker()"></div>
  <div class="sp-box">
    <div class="sp-hd">
      <div>
        <div class="sp-hd-title" id="sp-title">安排補課</div>
        <div class="sp-hd-sub" id="sp-sub"></div>
      </div>
      <button class="btn" onclick="closeSlotPicker()" style="padding:3px 10px;font-size:15px;flex-shrink:0">✕</button>
    </div>
    <div class="sp-body" id="sp-body"></div>
  </div>
</div>

<div id="week-modal" class="week-modal">
  <div class="week-modal-overlay" onclick="closeWeekModal()"></div>
  <div class="week-modal-box">
    <div class="week-modal-hd">
      <span id="week-modal-title">課程詳情</span>
      <button class="btn btns" onclick="closeWeekModal()" style="padding:3px 9px">✕</button>
    </div>
    <div id="week-modal-body"></div>
  </div>
</div>

<div class="lo" id="lo"><div class="spin"></div><div class="lo-txt" id="lo-txt">載入中...</div></div>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="app.js"></script>

<div class="stu-modal-wrap" id="stu-modal-wrap">
  <div class="stu-modal-overlay" onclick="closeStudentModal()"></div>
  <div class="stu-modal">
    <div class="stu-modal-hd">
      <div class="stu-modal-title">
        <span class="stu-modal-name" id="stu-modal-name"></span>
        <span class="stu-modal-grade" id="stu-modal-grade"></span>
      </div>
      <button class="stu-modal-close" onclick="closeStudentModal()">✕</button>
    </div>
    <div class="stu-modal-body" id="stu-modal-body"></div>
  </div>
</div>
</body>
</html>
